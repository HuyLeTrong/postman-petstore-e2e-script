name: Petstore API E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 10 * * *' # Runs daily at 10:00 UTC or 5:00 PM Vietnam Time
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman Collection
        run: |
          newman run Petstore_E2E_Testing.postman_collection.json \
            --env-var "baseUrl=https://petstore.swagger.io/v2" \
            --env-var "api_key=special-key" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman/report.html

      - name: Upload Newman Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman/